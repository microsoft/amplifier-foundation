bundle:
  name: amplifier-dev
  version: 2.1.0
  description: |
    Bundle for developing ON the Amplifier ecosystem.

    Features:
    - Multi-repo coordination
    - Testing patterns
    - Enhanced delegate tool with two-param context
    - Self-validation via amplifier-tester (Digital Twin Universe + Gitea pulled in transitively)

includes:
  # Base foundation (has delegate tool)
  - bundle: foundation
  # Amplifier dev behavior (agents + context)
  - bundle: git+https://github.com/microsoft/amplifier-foundation@main#subdirectory=behaviors/amplifier-dev.yaml
  # Self-validation: amplifier-tester pulls in digital-twin-universe,
  # which in turn pulls in gitea. Devs working ON the ecosystem need
  # all three to validate their changes in isolated DTU environments.
  - bundle: git+https://github.com/microsoft/amplifier-bundle-amplifier-tester@main

# Development-specific session settings
session:
  raw: true
