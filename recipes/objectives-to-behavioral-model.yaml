# =============================================================================
# OBJECTIVES-TO-BEHAVIORAL-MODEL RECIPE
# =============================================================================
#
# Generates a behavioral model document directly from objectives, without
# requiring an intermediate mechanism spec. This validates lifecycle C:
#   Objectives -> Model -> Implementation
#
# The designing-with-mechanisms guide provides the vocabulary of available
# mechanisms. The LLM reads the objectives and the guide, then designs
# what mechanisms should exist and how they compose.
#
# Usage:
#   recipes(
#     operation="execute",
#     recipe_path="recipes/objectives-to-behavioral-model.yaml",
#     context={
#       "objectives_path": "docs/examples/systems-design/objectives.md",
#       "output_path": "working/systems-design-behavioral-model-from-objectives.md"
#     }
#   )
#
# =============================================================================

name: "objectives-to-behavioral-model"
description: "Design mechanisms and generate a behavioral model from objectives"
version: "1.0.0"
tags: ["objectives", "behavioral-model", "design"]

context:
  objectives_path: ""    # Required: Path to the objectives markdown
  output_path: ""        # Required: Output file path for the behavioral model

steps:
  # ==========================================================================
  # Step 1: Design Mechanisms
  # Read the objectives and the designing-with-mechanisms guide, then design
  # what mechanisms should exist for this bundle. This is a creative step --
  # the LLM decides what to build, not just extracts what's already written.
  # ==========================================================================
  - id: "design-mechanisms"
    agent: "foundation:explorer"
    timeout: 600
    model_role: reasoning
    parse_json: true
    output: "design"
    prompt: |
      You are a mechanism design agent. Your task is to read a set of bundle
      objectives and design the mechanisms that would fulfill them.

      ## Step 1: Read the inputs

      Read these two documents using read_file:

      1. The objectives: {{objectives_path}}
      2. The mechanism guide: @foundation:context/understanding-mechanisms/designing-with-mechanisms.md

      The objectives describe WHAT the bundle should accomplish -- user goals,
      capabilities, and desired behaviors. The mechanism guide describes the
      available building blocks and how they compose.

      ## Step 2: Design the mechanisms

      Based on the objectives and your understanding of the mechanism types,
      design a complete set of mechanisms for this bundle. Return a JSON object
      with this schema:

      ```json
      {
        "bundle_identity": {
          "name": "", "purpose": "", "dependencies": [],
          "installation_paths": []
        },
        "context_files": [
          {"name": "", "purpose": "", "estimated_tokens": 0, "always_loaded": true}
        ],
        "modes": [
          {
            "name": "", "purpose": "",
            "tool_policies": {"safe": [], "warn": [], "confirm": [], "block": []},
            "default_action": "",
            "companion_skill": "",
            "transitions": [],
            "behavioral_directives": []
          }
        ],
        "agents": [
          {
            "name": "", "purpose": "",
            "model_role": ["primary_role", "fallback_role"],
            "trigger_conditions": [], "operating_modes": [],
            "behavioral_directives": [], "tool_requirements": [],
            "context_loading": [], "exit_conditions": []
          }
        ],
        "skills": [
          {
            "name": "", "type": "inline|fork|companion",
            "purpose": "", "invocation": "",
            "workflow_phases": [], "behavioral_directives": [],
            "mode_association": "",
            "delegation_pattern": {"delegates_to": "named_agent|anonymous_persona", "target": "", "count": 0}
          }
        ],
        "recipes": [
          {
            "name": "", "purpose": "", "execution_mode": "flat|staged",
            "steps": [{"id": "", "agent": "", "produces": "", "consumes": []}],
            "approval_gates": [{"name": "", "placed_after_step": "", "semantic": "validates_previous|authorizes_next"}],
            "relationship_to_modes": ""
          }
        ],
        "hooks": [
          {"name": "", "purpose": "", "triggers_on": "", "behavior": ""}
        ]
      }
      ```

      ## Design principles

      - Start minimal. Only add mechanisms that directly serve the objectives.
        Each mechanism must justify its existence against a specific objective.
      - Prefer composition over invention. If an existing foundation agent or
        skill serves the need, reference it rather than designing a new one.
      - Follow the established patterns from the guide: mode + companion skill
        pairing, context sink delegation, model role fallback chains.
      - Think about the user's workflow. What does the user say or do that
        triggers each mechanism? Design from the user's perspective inward.
      - For model_role, use ordered fallback arrays (e.g., ["reasoning", "general"]).
      - For tool policies, think about what should be blocked vs warned vs safe
        in each mode. Default action for unlisted tools should usually be "block"
        for restrictive modes and "safe" for permissive ones.
      - Include context files that provide the bundle's domain knowledge.
        Estimate token costs realistically (100-500 tokens for thin pointers,
        1000-5000 for substantial guidance).

      ## Rules

      - Every mechanism must trace back to at least one objective.
      - If an objective doesn't map to any mechanism, note it in a top-level
        "unmapped_objectives" array with the objective text and why no mechanism
        was designed for it.
      - Use empty arrays (not omission) for mechanism types that aren't needed.
      - Be specific in behavioral_directives -- these become the prose in context
        files and mode guidance that steer the LLM's behavior at runtime.

  # ==========================================================================
  # Step 2: Synthesize Model
  # Combine the designed mechanisms into a coherent behavioral model document
  # and write it to the output path.
  # ==========================================================================
  - id: "synthesize-model"
    agent: "foundation:file-ops"
    timeout: 600
    model_role: writing
    output: "model_document"
    prompt: |
      You are a technical writer producing a behavioral model for an
      Amplifier bundle based on mechanisms designed from its objectives.

      The following JSON was designed from the bundle's objectives. Use it
      as your ONLY source of truth. Do not infer or add anything not
      present in the design.

      ## Designed Mechanisms

      {{design}}

      ---

      Write a behavioral model document to: {{output_path}}

      ## Required Document Structure

      ### 1. Overview
      - Bundle name, purpose, dependencies
      - Component inventory: count by type
      - Objectives served (brief list)

      ### 2. Tool Governance
      - Tool availability matrix per mode (safe/warn/confirm/block)
      - Default action for unlisted tools
      - Note: delegation necessity and composition loopholes cannot be
        fully derived from a design (they require resolved transitive
        composition). Flag this as a limitation.

      ### 3. Mode Behaviors
      For each mode: purpose, tool policy, companion skill,
      transitions, behavioral directives

      ### 4. Agent Behaviors
      For each agent: purpose, model role, trigger conditions,
      operating modes, behavioral directives, tool requirements,
      context loading, exit conditions

      ### 5. Skill Behaviors
      For each skill: purpose, type (inline/fork/companion),
      invocation method, workflow phases, mode association

      ### 6. Context & Cross-Cutting Concerns
      - Context files and their roles
      - Token budget (from estimated_tokens if available)
      - Delegation chains and routing patterns

      ### 7. Recipe Workflows
      For each recipe: purpose, execution mode, step walkthrough,
      data flow, approval gates, relationship to modes

      ### 8. Behavioral Scenarios
      Generate 3-5 scenarios showing how mechanisms interact when
      triggered. For each scenario:
      - Trigger (what the user says/does)
      - Mechanism chain (which mechanisms activate in what order)
      - Context flow (what loads where)
      - Expected outcome

      Scenarios should cover: at least one mode-driven interactive
      flow, one recipe-driven automated flow, and one agent
      delegation chain.

      ### 9. Design Assumptions
      List what was assumed or decided that should be validated
      during implementation:
      - Token estimates (need measurement against real context windows)
      - Dependency availability (do referenced agents/tools exist?)
      - Tool policy completeness (which tools exist in practice?)
      - Interaction patterns (do the scenarios match real user behavior?)
      - Unmapped objectives (if any objectives couldn't be mapped to mechanisms)

      ## Writing Rules
      - Use actual component names from the design
      - Use markdown tables for structured comparisons
      - Cross-reference between sections where components interact
      - Flag where the design is ambiguous or underspecified
      - Do NOT invent behaviors not present in the design