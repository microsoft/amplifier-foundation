name: generate-bundle-docs
description: |
  Generates .detail.md composition tables for each bundle and behavior entry point,
  plus overview.dot + overview.png for the whole repository.

  Entry points discovered:
    - bundle.md (root bundle)
    - behaviors/*.yaml (behavior bundles)
    - bundles/*.yaml (standalone bundles)

  Output files:
    bundle.md          → bundle.detail.md   (co-located)
    behaviors/x.yaml   → behaviors/x.detail.md  (co-located)
    bundles/x.yaml     → bundles/x.detail.md    (co-located)
    overview.dot / overview.png  → repo root

  Detail markdown is structured data — no LLM enhancement needed.
  Overview DOT labels are LLM-enhanced by default (set enhance_diagrams: "false" to skip).
  Both types embed source_hash for freshness tracking.
version: "2.0.0"
author: "Amplifier Foundation"
tags: ["bundles", "documentation", "detail-md", "visualization"]

context:
  repo_path: ""        # Required: path to bundle repository root
  enhance_diagrams: "true"  # Optional: LLM-enhance overview DOT labels (true/false)

steps:
  # ============================================================================
  # STEP 1: Discover entry points and generate content
  # Calls bundle_detail_md() for each source file and bundle_overview_dot()
  # for the overview. Checks freshness via source_hash before including.
  # ============================================================================
  - id: "discover-and-generate"
    type: "bash"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json, sys, re
      from pathlib import Path

      repo_path = Path("{{repo_path}}").expanduser().resolve()

      if not repo_path.exists():
          print(json.dumps({
              "error": f"repo_path not found: {repo_path}",
              "detail_files": [],
              "overview_dot": "",
              "overview_needs_regen": False,
          }))
          sys.exit(0)

      sys.path.insert(0, str(repo_path / "tools"))
      try:
          from dot_docs.bundle_to_dot import bundle_detail_md, bundle_overview_dot
          from dot_docs.frontmatter import parse_frontmatter
      except ImportError:
          print(json.dumps({
              "error": "dot_docs not available",
              "detail_files": [],
              "overview_dot": "",
              "overview_needs_regen": False,
          }))
          sys.exit(0)

      # Discover entry points: root bundle, behaviors, standalone bundles
      files = []
      root = repo_path / "bundle.md"
      if root.exists():
          files.append(root)
      beh_dir = repo_path / "behaviors"
      if beh_dir.is_dir():
          files.extend(sorted(beh_dir.glob("*.yaml")))
          files.extend(sorted(beh_dir.glob("*.yml")))
      bun_dir = repo_path / "bundles"
      if bun_dir.is_dir():
          files.extend(sorted(bun_dir.glob("*.yaml")))
          files.extend(sorted(bun_dir.glob("*.yml")))

      detail_files = []
      for f in files:
          try:
              md_content = bundle_detail_md(f, repo_root=repo_path)
          except Exception:
              continue

          # Check freshness: .detail.md co-located with source file
          detail_path = f.with_name(f.stem + ".detail.md")
          needs_regen = True
          if detail_path.exists():
              existing = detail_path.read_text()
              new_hash = re.search(r'source_hash:\s*([a-f0-9]+)', md_content)
              old_hash = re.search(r'source_hash:\s*([a-f0-9]+)', existing)
              if new_hash and old_hash and new_hash.group(1) == old_hash.group(1):
                  needs_regen = False

          if not needs_regen:
              continue

          data, body = parse_frontmatter(f)
          bundle_info = data.get("bundle", {})
          name = bundle_info.get("name", f.stem)

          detail_files.append({
              "source_path": str(f),
              "detail_path": str(detail_path),
              "name": name,
              "content": md_content,
          })

      # Generate overview DOT and check freshness
      overview_dot = ""
      overview_needs_regen = False
      try:
          overview_dot = bundle_overview_dot(repo_path)
          overview_path = repo_path / "overview.dot"
          if overview_path.exists():
              existing_ov = overview_path.read_text()
              new_hash = re.search(r'source_hash="([a-f0-9]+)"', overview_dot)
              old_hash = re.search(r'source_hash="([a-f0-9]+)"', existing_ov)
              if new_hash and old_hash and new_hash.group(1) == old_hash.group(1):
                  overview_needs_regen = False
              else:
                  overview_needs_regen = True
          else:
              overview_needs_regen = bool(overview_dot)
      except Exception:
          overview_dot = ""

      print(json.dumps({
          "detail_files": detail_files,
          "overview_dot": overview_dot,
          "overview_needs_regen": overview_needs_regen,
      }))
      PYEOF
    output: "discovery"
    parse_json: true
    timeout: 60

  # ============================================================================
  # STEP 2: Write .detail.md files (no LLM needed — structured data tables)
  # ============================================================================
  - id: "write-detail-files"
    type: "bash"
    depends_on: ["discover-and-generate"]
    on_error: "continue"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json, sys
      from pathlib import Path

      _raw = r"""{{discovery}}"""
      discovery = json.loads(_raw)

      detail_files = discovery.get("detail_files", [])
      results = {"written": 0, "total": len(detail_files), "errors": []}

      for df in detail_files:
          detail_path = Path(df["detail_path"])
          try:
              detail_path.write_text(df["content"])
              results["written"] += 1
          except Exception as exc:
              results["errors"].append(f"Write failed for {detail_path.name}: {exc}")

      print(json.dumps(results))
      PYEOF
    output: "detail_write_results"
    parse_json: true
    timeout: 60

  # ============================================================================
  # STEP 3: LLM-enhance overview DOT labels (skip with enhance_diagrams: "false")
  # Only runs if an overview DOT needs to be written.
  # ============================================================================
  - id: "enhance-overview"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    condition: "{{enhance_diagrams}} != 'false'"
    depends_on: ["discover-and-generate"]
    on_error: "continue"
    timeout: 120
    prompt: |
      You are rewriting the labels of a DOT overview diagram for an Amplifier bundle repository.
      The goal: a non-technical person should understand the repository structure
      just from reading the diagram.

      ## Structural DOT (current auto-generated labels)
      ```dot
      {{discovery.overview_dot}}
      ```

      ## Your Task

      Rewrite the DOT to have clear, accessible labels. Rules:
      1. Keep ALL structural elements unchanged: node IDs, edges, shapes, colors,
         fillcolor, style, cluster subgraphs — don't touch them.
      2. ONLY change label="..." values on nodes and clusters, AND the graph title.
      3. For the graph title: write a descriptive name + subtitle.
      4. For bundle/behavior/agent nodes: add a brief description of what they represent.
      5. For cluster labels: make them descriptive.
      6. Keep labels to 2-3 lines max. Use \n for line breaks.
      7. Add a short // comment at the top explaining what this repository provides.
      8. Keep the source_hash="..." graph attribute exactly as-is.

      Return ONLY the complete rewritten DOT. No explanation, no markdown fences.
    output: "enhanced_overview_dot"

  # ============================================================================
  # STEP 4: Write overview.dot and render overview.png
  # Uses LLM-enhanced DOT if available, falls back to structural.
  # ============================================================================
  - id: "write-overview"
    type: "bash"
    depends_on: ["enhance-overview"]
    on_error: "continue"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json, subprocess, re, sys
      from pathlib import Path

      _raw = r"""{{discovery}}"""
      discovery = json.loads(_raw)

      overview_dot = discovery.get("overview_dot", "")
      overview_needs_regen = discovery.get("overview_needs_regen", False)

      results = {"written": 0, "rendered": 0, "fallback": 0, "errors": []}

      if not overview_dot or not overview_needs_regen:
          print(json.dumps(results))
          sys.exit(0)

      repo = Path("{{repo_path}}").expanduser().resolve()
      overview_path = repo / "overview.dot"
      png_path = repo / "overview.png"

      # Try LLM-enhanced version first
      enhanced_raw = r"""{{enhanced_overview_dot}}"""
      dot_content = None
      if enhanced_raw and enhanced_raw.strip() and enhanced_raw.strip() != "null":
          candidate = enhanced_raw.strip()
          candidate = re.sub(r'^```(?:dot)?\s*\n', '', candidate)
          candidate = re.sub(r'\n```\s*$', '', candidate)
          if candidate.startswith("//") or candidate.startswith("digraph"):
              dot_content = candidate
          elif "digraph" in candidate:
              m = re.search(r'((?://[^\n]*\n)*digraph\s+\w+\s*\{.*\})', candidate, re.DOTALL)
              if m:
                  dot_content = m.group(1)

      if not dot_content:
          dot_content = overview_dot
          results["fallback"] += 1

      # Ensure source_hash is preserved in the written DOT
      if "source_hash" not in dot_content:
          m = re.search(r'source_hash="[a-f0-9]+"', overview_dot)
          if m:
              dot_content = dot_content.replace('bgcolor="white"',
                  f'bgcolor="white"\n    {m.group(0)}')

      try:
          overview_path.write_text(dot_content)
          results["written"] += 1
      except Exception as exc:
          results["errors"].append(f"Write failed: {exc}")
          print(json.dumps(results))
          sys.exit(0)

      proc = subprocess.run(["dot", "-Tpng", str(overview_path), "-o", str(png_path)],
                            capture_output=True, text=True, timeout=15)
      if proc.returncode == 0:
          results["rendered"] += 1
      else:
          # Fallback to structural DOT
          overview_path.write_text(overview_dot)
          results["fallback"] += 1
          proc2 = subprocess.run(["dot", "-Tpng", str(overview_path), "-o", str(png_path)],
                                 capture_output=True, text=True, timeout=15)
          if proc2.returncode == 0:
              results["rendered"] += 1
          else:
              results["errors"].append(f"Render failed: {proc2.stderr[:100]}")

      print(json.dumps(results))
      PYEOF
    output: "overview_write_results"
    parse_json: true
    timeout: 60

  # ============================================================================
  # STEP 5: Summary
  # ============================================================================
  - id: "summary"
    type: "bash"
    depends_on: ["write-detail-files", "write-overview"]
    on_error: "continue"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json

      _detail_raw = r"""{{detail_write_results}}"""
      _overview_raw = r"""{{overview_write_results}}"""
      detail = json.loads(_detail_raw)
      overview = json.loads(_overview_raw)

      total_detail = detail.get("total", 0)
      written_detail = detail.get("written", 0)
      written_overview = overview.get("written", 0)
      rendered_overview = overview.get("rendered", 0)
      fallback = overview.get("fallback", 0)
      errors = detail.get("errors", []) + overview.get("errors", [])

      print(f"\n{'='*60}")
      print(f"Bundle Documentation Generation Complete")
      print(f"{'='*60}")
      print(f"  Entry points processed:  {total_detail}")
      print(f"  .detail.md files written: {written_detail}")
      print(f"  overview.dot written:    {written_overview}")
      print(f"  overview.png rendered:   {rendered_overview}")
      if fallback:
          print(f"  Structural fallback:     {fallback} (LLM output invalid, used auto-labels)")
      if errors:
          print(f"  Errors:                  {len(errors)}")
          for e in errors[:5]:
              print(f"    - {e}")
      print(f"{'='*60}")
      print(f"\n.detail.md files written next to their source files.")
      print(f"overview.dot/.png written to repo root.")
      PYEOF
    timeout: 15
