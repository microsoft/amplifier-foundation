name: generate-bundle-docs
description: |
  Generates bundle.dot + bundle.png for the whole repository via bundle_repo_dot().

  Calls bundle_repo_dot() with repo_path to produce a single 7-cluster structural
  DOT diagram covering behaviors, standalones, agents, modules, providers,
  experiments, and context files.

  Output files:
    bundle.dot  → repo root (structural or LLM-enhanced)
    bundle.png  → repo root (rendered via graphviz)

  Both embed source_hash for freshness tracking.
  LLM label enhancement is on by default (set enhance_diagrams: "false" to skip).
version: "3.0.0"
author: "Amplifier Foundation"
tags: ["bundles", "documentation", "visualization", "dot"]

context:
  repo_path: ""        # Required: path to bundle repository root
  enhance_diagrams: "true"  # Optional: LLM-enhance bundle DOT labels (true/false)

steps:
  # ============================================================================
  # STEP 1: Generate structural bundle.dot via bundle_repo_dot().
  # Checks freshness via source_hash — skips regeneration if hash matches.
  # ============================================================================
  - id: "generate-bundle-dot"
    type: "bash"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json, sys, re
      from pathlib import Path

      repo_path = Path("{{repo_path}}").expanduser().resolve()

      if not repo_path.exists():
          print(json.dumps({
              "error": f"repo_path not found: {repo_path}",
              "bundle_dot": "",
              "needs_regen": False,
          }))
          sys.exit(0)

      sys.path.insert(0, str(repo_path / "tools"))
      try:
          from dot_docs import bundle_repo_dot
      except ImportError:
          print(json.dumps({
              "error": "dot_docs not available — ensure tools/dot_docs/ exists in the target repo",
              "bundle_dot": "",
              "needs_regen": False,
          }))
          sys.exit(0)

      try:
          bundle_dot = bundle_repo_dot(repo_path)
      except Exception as exc:
          print(json.dumps({
              "error": f"bundle_repo_dot failed: {exc}",
              "bundle_dot": "",
              "needs_regen": False,
          }))
          sys.exit(0)

      # Check freshness: compare source_hash in existing bundle.dot
      bundle_path = repo_path / "bundle.dot"
      needs_regen = True
      if bundle_path.exists():
          existing = bundle_path.read_text()
          new_hash = re.search(r'source_hash="([a-f0-9]+)"', bundle_dot)
          old_hash = re.search(r'source_hash="([a-f0-9]+)"', existing)
          if new_hash and old_hash and new_hash.group(1) == old_hash.group(1):
              needs_regen = False

      print(json.dumps({
          "bundle_dot": bundle_dot,
          "needs_regen": needs_regen,
      }))
      PYEOF
    output: "generation"
    parse_json: true
    timeout: 60

  # ============================================================================
  # STEP 2: LLM-enhance bundle DOT labels (skip with enhance_diagrams: "false")
  # Only runs when a bundle DOT needs to be written.
  # ============================================================================
  - id: "enhance-bundle-dot"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    condition: "{{enhance_diagrams}} != 'false'"
    depends_on: ["generate-bundle-dot"]
    on_error: "continue"
    timeout: 120
    prompt: |
      You are rewriting the labels of a DOT diagram for an Amplifier bundle repository.
      The goal: a non-technical person should understand the repository structure
      just from reading the diagram.

      ## Structural DOT (current auto-generated labels)
      ```dot
      {{generation.bundle_dot}}
      ```

      ## Your Task

      Rewrite the DOT to have clear, accessible labels. Rules:
      1. Keep ALL structural elements unchanged: node IDs, edges, shapes, colors,
         fillcolor, style, cluster subgraphs — don't touch them.
      2. ONLY change label="..." values on nodes and clusters, AND the graph title.
      3. For the graph title: write a descriptive name + subtitle.
      4. For bundle/behavior/agent nodes: add a brief description of what they represent.
      5. For cluster labels: make them descriptive.
      6. Keep labels to 2-3 lines max. Use \n for line breaks.
      7. Add a short // comment at the top explaining what this repository provides.
      8. Keep the source_hash="..." graph attribute exactly as-is.

      Return ONLY the complete rewritten DOT. No explanation, no markdown fences.
    output: "enhanced_bundle_dot"

  # ============================================================================
  # STEP 3: Write bundle.dot and render bundle.png.
  # Uses LLM-enhanced DOT if available, falls back to structural.
  # ============================================================================
  - id: "write-bundle-dot"
    type: "bash"
    depends_on: ["enhance-bundle-dot"]
    on_error: "continue"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json, subprocess, re, sys
      from pathlib import Path

      _raw = r"""{{generation}}"""
      generation = json.loads(_raw)
      bundle_dot = generation.get("bundle_dot", "")
      needs_regen = generation.get("needs_regen", False)

      results = {"written": 0, "rendered": 0, "fallback": 0, "errors": []}

      if not bundle_dot or not needs_regen:
          print(json.dumps(results))
          sys.exit(0)

      repo = Path("{{repo_path}}").expanduser().resolve()
      bundle_path = repo / "bundle.dot"
      png_path = repo / "bundle.png"

      # Try LLM-enhanced version first
      enhanced_raw = r"""{{enhanced_bundle_dot}}"""
      dot_content = None
      if enhanced_raw and enhanced_raw.strip() and enhanced_raw.strip() != "null":
          candidate = enhanced_raw.strip()
          candidate = re.sub(r'^```(?:dot)?\s*\n', '', candidate)
          candidate = re.sub(r'\n```\s*$', '', candidate)
          if candidate.startswith("//") or candidate.startswith("digraph"):
              dot_content = candidate
          elif "digraph" in candidate:
              m = re.search(r'((?://[^\n]*\n)*digraph\s+\w+\s*\{.*\})', candidate, re.DOTALL)
              if m:
                  dot_content = m.group(1)

      if not dot_content:
          dot_content = bundle_dot
          results["fallback"] += 1

      # Ensure source_hash is preserved in the written DOT
      if "source_hash" not in dot_content:
          m = re.search(r'source_hash="[a-f0-9]+"', bundle_dot)
          if m:
              dot_content = dot_content.replace('bgcolor="white"',
                  f'bgcolor="white"\n    {m.group(0)}')

      try:
          bundle_path.write_text(dot_content)
          results["written"] += 1
      except Exception as exc:
          results["errors"].append(f"Write failed: {exc}")
          print(json.dumps(results))
          sys.exit(0)

      proc = subprocess.run(["dot", "-Tpng", str(bundle_path), "-o", str(png_path)],
                            capture_output=True, text=True, timeout=15)
      if proc.returncode == 0:
          results["rendered"] += 1
      else:
          # Fallback to structural DOT
          bundle_path.write_text(bundle_dot)
          results["fallback"] += 1
          proc2 = subprocess.run(["dot", "-Tpng", str(bundle_path), "-o", str(png_path)],
                                 capture_output=True, text=True, timeout=15)
          if proc2.returncode == 0:
              results["rendered"] += 1
          else:
              results["errors"].append(f"Render failed: {proc2.stderr[:100]}")

      print(json.dumps(results))
      PYEOF
    output: "write_results"
    parse_json: true
    timeout: 60

  # ============================================================================
  # STEP 4: Summary
  # ============================================================================
  - id: "summary"
    type: "bash"
    depends_on: ["write-bundle-dot"]
    on_error: "continue"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json

      _gen_raw = r"""{{generation}}"""
      _write_raw = r"""{{write_results}}"""
      generation = json.loads(_gen_raw)
      write = json.loads(_write_raw)

      bundle_dot = generation.get("bundle_dot", "")
      needs_regen = generation.get("needs_regen", False)
      written = write.get("written", 0)
      rendered = write.get("rendered", 0)
      fallback = write.get("fallback", 0)
      errors = write.get("errors", [])

      print(f"\n{'='*60}")
      print(f"Bundle Documentation Generation Complete")
      print(f"{'='*60}")
      if not bundle_dot:
          err = generation.get("error", "unknown error")
          print(f"  Error: {err}")
      elif not needs_regen:
          print(f"  bundle.dot is up-to-date (source_hash unchanged)")
      else:
          print(f"  bundle.dot written:   {written}")
          print(f"  bundle.png rendered:  {rendered}")
          if fallback:
              print(f"  Structural fallback:  {fallback} (LLM output invalid, used auto-labels)")
          if errors:
              print(f"  Errors:               {len(errors)}")
              for e in errors[:5]:
                  print(f"    - {e}")
      print(f"{'='*60}")
      print(f"\nbundle.dot / bundle.png written to repo root.")
      PYEOF
    timeout: 15
