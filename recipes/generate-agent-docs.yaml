name: generate-agent-docs
description: |
  Generates DOT composition card diagrams with accessible labels for all
  agent .md files in a repository. Also generates agents/TOPOLOGY.dot
  showing delegation relationships. Produces DOT+PNG pairs co-located
  next to their source files.
version: "1.0.0"
author: "Amplifier Foundation"
tags: ["agents", "documentation", "dot", "visualization"]

context:
  repo_path: ""
  enhance_diagrams: "true"

steps:
  # ============================================================================
  # STEP 1: Discover agent files and generate structural DOT skeletons
  # ============================================================================
  - id: "discover-and-generate"
    type: "bash"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json, sys, re
      from pathlib import Path

      repo_path = Path("{{repo_path}}").expanduser().resolve()

      if not repo_path.exists():
          print(json.dumps({"error": f"repo_path not found", "agents": []}))
          sys.exit(0)

      sys.path.insert(0, str(repo_path / "tools"))
      try:
          from dot_docs.agent_to_dot import agent_to_dot, agents_topology_dot
          from dot_docs.frontmatter import parse_frontmatter
      except ImportError:
          print(json.dumps({"error": "dot_docs not available", "agents": []}))
          sys.exit(0)

      agents_dir = repo_path / "agents"
      if not agents_dir.is_dir():
          print(json.dumps({"agents": [], "topology_dot": ""}))
          sys.exit(0)

      agents = []
      for f in sorted(agents_dir.glob("*.md")):
          try:
              structural_dot = agent_to_dot(f, repo_root=repo_path)
          except Exception:
              continue

          data, body = parse_frontmatter(f)
          meta = data.get("meta", {})
          name = meta.get("name", f.stem)
          desc = str(meta.get("description", ""))[:300]

          dot_path = f.with_suffix(".dot")
          needs_regen = True
          if dot_path.exists():
              existing = dot_path.read_text()
              new_hash = re.search(r'source_hash="([a-f0-9]+)"', structural_dot)
              old_hash = re.search(r'source_hash="([a-f0-9]+)"', existing)
              if new_hash and old_hash and new_hash.group(1) == old_hash.group(1):
                  needs_regen = False

          if not needs_regen:
              continue

          agents.append({
              "md_path": str(f),
              "dot_path": str(dot_path),
              "name": name,
              "description": desc,
              "structural_dot": structural_dot,
          })

      # Generate topology
      try:
          topology_dot = agents_topology_dot(agents_dir)
      except Exception:
          topology_dot = ""

      print(json.dumps({"agents": agents, "topology_dot": topology_dot}))
      PYEOF
    output: "discovery"
    parse_json: true
    timeout: 60

  # ============================================================================
  # STEP 2: Enhance labels with LLM (foreach agent, bounded parallel)
  # ============================================================================
  - id: "enhance-labels"
    agent: "foundation:zen-architect"
    mode: "ARCHITECT"
    condition: "{{enhance_diagrams}} != 'false'"
    depends_on: ["discover-and-generate"]
    foreach: "{{discovery.agents}}"
    as: "agent"
    parallel: 3
    collect: "enhanced_dots"
    on_error: "continue"
    timeout: 120
    prompt: |
      You are rewriting the labels of a DOT composition card for an AI agent.
      The goal: a non-technical person should understand what this agent does
      and what tools/context it has just from reading the diagram.

      ## Source Agent
      Name: {{agent.name}}
      Description: {{agent.description}}

      ## Structural DOT (current auto-generated labels)
      ```dot
      {{agent.structural_dot}}
      ```

      ## Your Task

      Rewrite the DOT labels for accessibility. Rules:
      1. Keep ALL structural elements unchanged: node IDs, edges, shapes, colors.
      2. ONLY change label="..." values and the graph title.
      3. For the graph title: friendly name + what this agent does.
      4. For tool nodes: add brief description of what the tool provides.
      5. For context nodes: describe what knowledge this provides.
      6. For delegation targets: describe the relationship.
      7. Keep labels to 2-3 lines max. Use \n for line breaks.
      8. Add a // comment at the top.
      9. Keep source_hash exactly as-is.

      Return ONLY the complete rewritten DOT. No explanation, no markdown fences.

  # ============================================================================
  # STEP 3: Write enhanced DOT files and render PNGs
  # ============================================================================
  - id: "write-and-render"
    type: "bash"
    depends_on: ["enhance-labels"]
    on_error: "continue"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json, subprocess, re, sys
      from pathlib import Path

      discovery = json.loads(r"""{{discovery}}""")
      enhanced_raw = r"""{{enhanced_dots}}"""

      agents = discovery.get("agents", [])
      enhanced_list = []
      try:
          enhanced_list = json.loads(enhanced_raw)
      except (json.JSONDecodeError, TypeError):
          s = enhanced_raw.strip() if isinstance(enhanced_raw, str) else ""
          if s and s != "null":
              enhanced_list = [s]

      results = {"written": 0, "rendered": 0, "fallback": 0, "errors": []}

      for i, ai in enumerate(agents):
          dot_path = Path(ai["dot_path"])
          png_path = dot_path.with_suffix(".png")

          dot_content = None
          if i < len(enhanced_list) and enhanced_list[i]:
              candidate = str(enhanced_list[i]).strip()
              candidate = re.sub(r'^```(?:dot)?\s*\n', '', candidate)
              candidate = re.sub(r'\n```\s*$', '', candidate)
              if candidate.startswith("//") or candidate.startswith("digraph"):
                  dot_content = candidate
              elif "digraph" in candidate:
                  m = re.search(r'((?://[^\n]*\n)*digraph\s+\w+\s*\{.*\})', candidate, re.DOTALL)
                  if m:
                      dot_content = m.group(1)

          if not dot_content:
              dot_content = ai["structural_dot"]
              results["fallback"] += 1

          if "source_hash" not in dot_content:
              m = re.search(r'source_hash="[a-f0-9]+"', ai["structural_dot"])
              if m:
                  dot_content = dot_content.replace('bgcolor="white"',
                      f'bgcolor="white"\n    {m.group(0)}')

          try:
              dot_path.write_text(dot_content)
              results["written"] += 1
          except Exception as exc:
              results["errors"].append(f"Write failed: {exc}")
              continue

          proc = subprocess.run(["dot", "-Tpng", str(dot_path), "-o", str(png_path)],
                                capture_output=True, text=True, timeout=15)
          if proc.returncode == 0:
              results["rendered"] += 1
          else:
              dot_path.write_text(ai["structural_dot"])
              results["fallback"] += 1
              proc2 = subprocess.run(["dot", "-Tpng", str(dot_path), "-o", str(png_path)],
                                     capture_output=True, text=True, timeout=15)
              if proc2.returncode == 0:
                  results["rendered"] += 1
              else:
                  results["errors"].append(f"Render failed: {proc2.stderr[:100]}")

      # Write topology
      topology_dot = discovery.get("topology_dot", "")
      if topology_dot:
          repo = Path("{{repo_path}}").expanduser().resolve()
          topo_path = repo / "agents" / "TOPOLOGY.dot"
          topo_path.write_text(topology_dot)
          subprocess.run(["dot", "-Tpng", str(topo_path), "-o", str(topo_path.with_suffix(".png"))],
                        capture_output=True, text=True, timeout=15)
          results["written"] += 1
          results["rendered"] += 1

      results["total"] = len(agents)
      print(json.dumps(results))
      PYEOF
    output: "write_results"
    parse_json: true
    timeout: 120

  # ============================================================================
  # STEP 4: Summary
  # ============================================================================
  - id: "summary"
    type: "bash"
    depends_on: ["write-and-render"]
    on_error: "continue"
    command: |
      "${AMPLIFIER_PYTHON:-python3}" << 'PYEOF'
      import json

      _write_raw = r"""{{write_results}}"""
      write_results = json.loads(_write_raw)

      total = write_results.get("total", 0)
      written = write_results.get("written", 0)
      rendered = write_results.get("rendered", 0)
      fallback = write_results.get("fallback", 0)
      errors = write_results.get("errors", [])

      print(f"\n{'='*60}")
      print(f"Agent Documentation Generation Complete")
      print(f"{'='*60}")
      print(f"  Agents processed:    {total}")
      print(f"  DOT files written:   {written}")
      print(f"  PNGs rendered:       {rendered}")
      if fallback:
          print(f"  Structural fallback: {fallback} (LLM output invalid, used auto-labels)")
      if errors:
          print(f"  Errors:             {len(errors)}")
          for e in errors[:5]:
              print(f"    - {e}")
      print(f"{'='*60}")
      print(f"\nDOT+PNG files written next to their source agent .md files.")
      print(f"agents/TOPOLOGY.dot/.png written for delegation graph.")
      PYEOF
    timeout: 15
