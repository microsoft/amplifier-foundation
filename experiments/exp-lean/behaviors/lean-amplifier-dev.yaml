---
bundle:
  name: lean-amplifier-dev-behavior
  version: 1.0.0
  description: |
    Dev-focused agents and Python tooling layer.
    Expects lean-foundation (or equivalent) to provide session config and core tools.
    
    Agents: bug-hunter, explorer, file-ops, git-ops, modular-builder, zen-architect, post-task-cleanup
    Tools: python_check (ruff/pyright), LSP (pyright), apply-patch (V4A diff)
    
    Excludes: browser-tester, terminal-tester, design-intelligence, stories,
    dot-graph, superpowers, recipes, shadow, MCP, skills, routing-matrix,
    amplifier-expert, core-expert, foundation-expert.

includes:
  # Python tooling: LSP (pyright) + quality (ruff/pyright check + auto-check hook)
  - bundle: git+https://github.com/microsoft/amplifier-bundle-python-dev@main
  # V4A diff editing (apply_patch tool + editing guidance context)
  - bundle: git+https://github.com/microsoft/amplifier-bundle-filesystem@main#subdirectory=behaviors/apply-patch.yaml

# Dev agents (from foundation — no local copies needed)
agents:
  include:
    - foundation:bug-hunter
    - foundation:explorer
    - foundation:file-ops
    - foundation:git-ops
    - foundation:modular-builder
    - foundation:zen-architect
    - foundation:post-task-cleanup

# Per-bundle agent roster context (describes the 7 agents above).
# Pairs with delegation-mechanics.md loaded by lean-foundation.
context:
  include:
    - foundation:experiments/exp-lean/context/exp-lean-amplifier-dev-agents.md
